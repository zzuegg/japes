<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="japes — Ape-grade Parallel ECS">
  <title>japes</title>
  <defs>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e57c2"/>
      <stop offset="40%" stop-color="#4527a0"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="chest" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#5e35b1"/>
      <stop offset="100%" stop-color="#311b92"/>
    </linearGradient>
    <linearGradient id="faceSkin" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#9575cd"/>
      <stop offset="100%" stop-color="#6a3baf"/>
    </linearGradient>
    <linearGradient id="eyeFire" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00b0ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="circuitGlow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="apeColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
  </defs>

  <!-- ========== GORILLA — head + shoulders + chest ========== -->
  <g transform="translate(4, 0)">

    <!-- LEFT SHOULDER — broad, muscular -->
    <path d="M-4 98 Q-4 70 10 58 Q18 50 26 48 Q30 46 32 42"
          fill="url(#chest)" stroke="none"/>
    <ellipse cx="8" cy="78" rx="18" ry="24" fill="url(#chest)"/>

    <!-- RIGHT SHOULDER -->
    <path d="M100 98 Q100 70 86 58 Q78 50 70 48 Q66 46 64 42"
          fill="url(#chest)" stroke="none"/>
    <ellipse cx="88" cy="78" rx="18" ry="24" fill="url(#chest)"/>

    <!-- CHEST / NECK connector -->
    <path d="M20 65 Q48 55 76 65 L76 98 L20 98 Z" fill="url(#chest)"/>

    <!-- HEAD — broad, with sagittal crest (the power ridge) -->
    <path d="M14 52 Q14 20 28 10 Q36 4 48 2 Q60 4 68 10 Q82 20 82 52 Q82 68 72 74 Q60 78 48 78 Q36 78 24 74 Q14 68 14 52 Z"
          fill="url(#fur)"/>

    <!-- Sagittal crest — the ridge on top, makes it look powerful -->
    <path d="M34 6 Q40 -2 48 -2 Q56 -2 62 6 Q56 4 48 3.5 Q40 4 34 6 Z"
          fill="#311b92"/>

    <!-- Ears -->
    <ellipse cx="14" cy="40" rx="7" ry="11" fill="#311b92"/>
    <ellipse cx="14" cy="40" rx="4" ry="7" fill="#4527a0" opacity="0.5"/>
    <ellipse cx="82" cy="40" rx="7" ry="11" fill="#311b92"/>
    <ellipse cx="82" cy="40" rx="4" ry="7" fill="#4527a0" opacity="0.5"/>

    <!-- FACE PLATE — lighter inner area -->
    <ellipse cx="48" cy="50" rx="24" ry="22" fill="url(#faceSkin)"/>

    <!-- BROW RIDGE — heavy, intimidating -->
    <path d="M22 34 Q30 24 48 23 Q66 24 74 34 Q66 30 48 29 Q30 30 22 34 Z"
          fill="#1a0a3e" opacity="0.8"/>

    <!-- Eye sockets — deep, dark -->
    <ellipse cx="36" cy="38" rx="9" ry="6.5" fill="#0d0620" opacity="0.7"/>
    <ellipse cx="60" cy="38" rx="9" ry="6.5" fill="#0d0620" opacity="0.7"/>

    <!-- EYES — fierce amber fire, the signature -->
    <ellipse cx="36" cy="38" rx="6.5" ry="5" fill="url(#eyeFire)" filter="url(#eyeGlow)"/>
    <ellipse cx="60" cy="38" rx="6.5" ry="5" fill="url(#eyeFire)" filter="url(#eyeGlow)"/>
    <!-- Slit pupils — predatory intelligence -->
    <ellipse cx="37" cy="38" rx="1.8" ry="4" fill="#1a0a3e"/>
    <ellipse cx="61" cy="38" rx="1.8" ry="4" fill="#1a0a3e"/>
    <!-- Bright highlights -->
    <circle cx="34" cy="36" r="1.5" fill="white" opacity="0.85"/>
    <circle cx="58" cy="36" r="1.5" fill="white" opacity="0.85"/>

    <!-- NOSE — wide, gorilla-like -->
    <path d="M40 52 Q43 48 48 48 Q53 48 56 52 Q57 57 53 60 Q48 62 43 60 Q39 57 40 52 Z"
          fill="#3a1d6e"/>
    <ellipse cx="44" cy="55" rx="2.8" ry="2" fill="#0d0620" opacity="0.6"/>
    <ellipse cx="52" cy="55" rx="2.8" ry="2" fill="#0d0620" opacity="0.6"/>

    <!-- MOUTH — strong jaw, slight snarl -->
    <path d="M38 65 Q43 68 48 67 Q53 68 58 65"
          fill="none" stroke="#3a1d6e" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Jaw line -->
    <path d="M28 62 Q28 72 38 74 Q48 76 58 74 Q68 72 68 62"
          fill="none" stroke="#311b92" stroke-width="0.8" opacity="0.3"/>

    <!-- ========== CIRCUIT TRACES — AI/digital overlay ========== -->
    <g filter="url(#circuitGlow)">
      <!-- Left shoulder circuit -->
      <polyline points="4,90 8,80 14,76 22,72 28,64"
                fill="none" stroke="url(#circuit)" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="8" cy="80" r="1.8" fill="#00e5ff" opacity="0.8"/>
      <circle cx="22" cy="72" r="1.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="28" cy="64" r="1.8" fill="#00e5ff" opacity="0.8"/>

      <!-- Right shoulder circuit -->
      <polyline points="92,90 88,80 82,76 74,72 68,64"
                fill="none" stroke="url(#circuit)" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="88" cy="80" r="1.8" fill="#00e5ff" opacity="0.8"/>
      <circle cx="74" cy="72" r="1.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="68" cy="64" r="1.8" fill="#00e5ff" opacity="0.8"/>

      <!-- Forehead circuit — the "brain" -->
      <polyline points="30,20 36,14 48,10 60,14 66,20"
                fill="none" stroke="url(#circuit)" stroke-width="1" stroke-linecap="round"/>
      <circle cx="36" cy="14" r="1.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="48" cy="10" r="2" fill="#00e5ff" opacity="0.9"/>
      <circle cx="60" cy="14" r="1.5" fill="#00e5ff" opacity="0.7"/>
      <!-- Cross connections -->
      <line x1="36" y1="14" x2="60" y2="14" stroke="#00e5ff" stroke-width="0.6" opacity="0.35"/>
      <line x1="48" y1="10" x2="48" y2="20" stroke="#00e5ff" stroke-width="0.6" opacity="0.25"/>

      <!-- Spine circuit running down neck -->
      <polyline points="48,20 48,30 46,45 48,55 48,70 48,85"
                fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>
      <circle cx="48" cy="45" r="1.2" fill="#00e5ff" opacity="0.35"/>
      <circle cx="48" cy="70" r="1.2" fill="#00e5ff" opacity="0.25"/>

      <!-- Branch from spine to shoulders -->
      <line x1="48" y1="70" x2="28" y2="64" stroke="#00e5ff" stroke-width="0.6" opacity="0.2"/>
      <line x1="48" y1="70" x2="68" y2="64" stroke="#00e5ff" stroke-width="0.6" opacity="0.2"/>
    </g>

    <!-- Scan lines — subtle digital overlay on the face -->
    <g opacity="0.06">
      <line x1="24" y1="34" x2="72" y2="34" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="24" y1="38" x2="72" y2="38" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="24" y1="42" x2="72" y2="42" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="28" y1="46" x2="68" y2="46" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="30" y1="50" x2="66" y2="50" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="32" y1="54" x2="64" y2="54" stroke="#00e5ff" stroke-width="0.5"/>
      <line x1="34" y1="58" x2="62" y2="58" stroke="#00e5ff" stroke-width="0.5"/>
    </g>
  </g>

  <!-- ========== WORDMARK — "japes" as one tight word ========== -->
  <g font-family="'JetBrains Mono','SF Mono','Fira Code','Cascadia Code',monospace"
     font-weight="800" font-size="54">
    <!-- Single text element, tspan for color split -->
    <text x="118" y="58">
      <tspan fill="#b39ddb">j</tspan><tspan fill="url(#apeColor)">ape</tspan><tspan fill="#b39ddb">s</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="120" y="78" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif"
        font-size="10" fill="#9575cd" letter-spacing="3" opacity="0.65"
        font-weight="500">
    APE-GRADE PARALLEL ECS
  </text>
</svg>
