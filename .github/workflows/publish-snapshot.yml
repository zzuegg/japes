name: publish-snapshot

# Build ecs-core and upload a SNAPSHOT Maven artifact to GitHub Packages
# on every push to main (and on demand). Consumers can then depend on
#
#   io.github.zzuegg.japes:ecs-core:0.1.0-SNAPSHOT
#
# by adding the GitHub Packages Maven repository — see
# site/docs/getting-started/installation.md for the client-side wiring.

on:
  push:
    branches: [main]
    paths:
      - 'ecs-core/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/publish-snapshot.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Run ecs-core tests
        run: ./gradlew :ecs-core:test

      - name: Publish ecs-core snapshot to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :ecs-core:publish
